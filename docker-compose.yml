# ─────────────────────────────────────────────
# docker-compose.yml
# AI-Based Network Intrusion Detection System
# ─────────────────────────────────────────────
#
# Commands:
#   Start:    docker-compose up
#   Build:    docker-compose up --build
#   Stop:     docker-compose down
#   Logs:     docker-compose logs -f ids
#   Shell:    docker-compose exec ids bash
#

services:

  # ── Main IDS Application ─────────────────────
  ids:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: netguard-ids

    # Restart automatically if it crashes
    restart: unless-stopped

    ports:
      - "5000:5000"     # Dashboard → http://localhost:5000

    environment:
      # Flask settings
      - IDS_PORT=5000
      - IDS_HOST=0.0.0.0
      - IDS_DEBUG=0
      - IDS_SECRET_KEY=${IDS_SECRET_KEY:-netguard_docker_secret_change_in_production}
      - IDS_USERNAME=${IDS_USERNAME:-admin}
      - IDS_PASSWORD=${IDS_PASSWORD:-netguard123}
      - IDS_SHOW_LOGIN_HINT=${IDS_SHOW_LOGIN_HINT:-0}

      # SocketIO CORS: keep cookies same-origin by default.
      - IDS_CORS_ORIGINS=${IDS_CORS_ORIGINS:-http://localhost:5000,http://127.0.0.1:5000}

      # Python
      - PYTHONUNBUFFERED=1

    volumes:
      # ── Persistent volumes ─────────────────────
      # data/ — NSL-KDD dataset files (read-only inside container)
      # Mount your local data/ folder so the container can read the dataset
      - ./data:/app/data:ro

      # models/ — trained model .pkl files (read-only inside container)
      # Generated by train.py on your host machine, read by the container
      - ./models:/app/models:ro

      # logs/ — SQLite database + alert log (read-write)
      # Persists between container restarts
      - ./logs:/app/logs

      # static/reports/ — generated chart images (read-only)
      # Generated by train.py on host, served by Flask inside container
      - ./static/reports:/app/static/reports:ro

    # ── Resource limits ──────────────────────────
    # Prevents the container from consuming all host RAM
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

    # ── Health check ─────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Training Service (optional) ──────────────
  # Run this to train the model inside Docker instead of on your host
  # Usage: docker-compose run --rm trainer
  trainer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: netguard-trainer

    # Override the default command to run train.py instead
    command: python train.py

    volumes:
      # data/ — dataset needed for training
      - ./data:/app/data:ro

      # models/ — write trained artifacts here
      - ./models:/app/models

      # static/reports/ — write generated charts here
      - ./static/reports:/app/static/reports

    environment:
      - PYTHONUNBUFFERED=1

    # Don't restart trainer — it runs once and exits
    restart: no

    # Don't start trainer automatically — only when explicitly run
    profiles:
      - training
