<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NetGuard AI — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--surf:#111827;--surf2:#1a2332;
    --bord:rgba(255,255,255,.08);--text:#94a3b8;
    --white:#f1f5f9;--muted:#64748b;
    --blue:#38bdf8;--red:#f87171;--green:#4ade80;
    --mono:'JetBrains Mono','Fira Code',monospace;
  }
  html,body{height:100%;background:var(--bg);font-family:'Inter','Segoe UI',sans-serif;color:var(--text)}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .bg-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(56,189,248,.06) 0%,transparent 70%);pointer-events:none}
  .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
  .card{width:100%;max-width:400px;background:var(--surf);border:1px solid var(--bord);border-radius:16px;padding:40px 36px;box-shadow:0 24px 64px rgba(0,0,0,.4);position:relative}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);border-radius:16px 16px 0 0}
  .logo{text-align:center;margin-bottom:28px}
  .logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,rgba(56,189,248,.2),rgba(56,189,248,.05));border:1px solid rgba(56,189,248,.3);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
  .logo-name{font-size:22px;font-weight:800;color:var(--white);letter-spacing:-.5px}
  .logo-sub{font-size:11px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:4px}
  .status-wrap{text-align:center;margin-bottom:24px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--green);text-transform:uppercase}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .form-group{margin-bottom:18px}
  .form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .input-wrap{position:relative}
  .form-input{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:9px;padding:12px 14px;font-size:14px;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
  .form-input:focus{border-color:rgba(56,189,248,.5);box-shadow:0 0 0 3px rgba(56,189,248,.08)}
  .form-input::placeholder{color:var(--muted)}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;transition:color .2s}
  .pw-toggle:hover{color:var(--white)}
  .error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:9px;padding:11px 14px;margin-bottom:18px;font-size:12px;color:var(--red);font-weight:500;display:flex;align-items:center;gap:8px}
  .btn-login{width:100%;padding:13px;border:none;border-radius:9px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-top:4px;box-shadow:0 4px 16px rgba(56,189,248,.25)}
  .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(56,189,248,.35)}
  .btn-login:active{transform:translateY(0)}
  .hint{text-align:center;font-size:10px;color:var(--muted);margin-top:20px;line-height:1.8}
  .hint code{font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px;color:var(--text)}
  .footer{margin-top:28px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:.5px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="page">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-name">NetGuard AI</div>
      <div class="logo-sub">AI Intrusion Detection System</div>
    </div>

    <div class="status-wrap">
      <div class="status-badge">
        <div class="status-dot"></div>
        System Online
      </div>
    </div>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
      <input type="hidden" name="next" value="{{ next_url }}"/>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input" type="text" id="username" name="username"
          placeholder="Enter username" autocomplete="username" required autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            class="form-input" type="password" id="password" name="password"
            placeholder="Enter password" autocomplete="current-password"
            required style="padding-right:44px"
          />
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pwBtn">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    {% if show_login_hint %}
    <div class="hint">
      Default &nbsp;·&nbsp; Username: <code>admin</code> &nbsp;·&nbsp; Password: <code>netguard123</code><br/>
      Override with env vars &nbsp;<code>IDS_USERNAME</code> &nbsp;/&nbsp; <code>IDS_PASSWORD</code>
    </div>
    {% endif %}

  </div>
  <div class="footer">NSL-KDD · Random Forest · Flask + SocketIO</div>
</div>

<script>
function togglePw(){
  const inp=document.getElementById('password'),btn=document.getElementById('pwBtn');
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}
</script>
</body>
</html>
